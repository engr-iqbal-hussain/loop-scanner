<!DOCTYPE html>
<html>
<head>
<title>Loop Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
body{
font-family:Arial;
text-align:center;
padding:40px;
}
button,input{
font-size:18px;
padding:10px;
}
</style>
</head>

<body>

<h2>Loop Folder Scanner</h2>

<input type="file" accept="image/*" capture="environment" id="camera">

<p id="progress"></p>
<p id="detected"></p>
<p id="loop"></p>
<p id="status"></p>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1KpQhFdHimHm8rPLZ6519E9ADCUrCeGuYq7HXpLrzzAk/gviz/tq?tqx=out:csv";

document.getElementById("camera").addEventListener("change", function(){

document.getElementById("progress").innerHTML="Scanning image... please wait";

const file = this.files[0];

Tesseract.recognize(
file,
'eng'
).then(function(result){

let text = result.data.text;

document.getElementById("detected").innerHTML =
"Detected Text: <br>"+text;

const match = text.match(/R\d{2,3}-\d{3}-T-\d{3}/);

if(!match){

document.getElementById("loop").innerHTML =
"Loop number not detected";

return;

}

let loop = match[0];

document.getElementById("loop").innerHTML =
"Loop Number: "+loop;

fetch(sheetURL)
.then(response => response.text())
.then(data => {

let rows = data.split("\n");

let found=false;

rows.forEach(function(row){

let cols=row.split(",");

if(cols[0] && cols[0].trim()==loop){

found=true;

document.getElementById("status").innerHTML =
"Status: "+cols[1];

}

});

if(!found){

document.getElementById("status").innerHTML =
"Loop found but no status";

}

});

});

});

</script>

</body>
</html>
