<!DOCTYPE html>
<html>
<head>

<title>Loop Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body{
font-family:Arial;
text-align:center;
padding:20px;
}

video{
width:100%;
max-width:400px;
border:2px solid black;
}
</style>

</head>

<body>

<h2>Loop Scanner</h2>

<video id="video"></video>

<p id="result">Scanning...</p>

<script>

const codeReader = new ZXing.BrowserMultiFormatReader()

const sheetURL = "https://docs.google.com/spreadsheets/d/1KpQhFdHimHm8rPLZ6519E9ADCUrCeGuYq7HXpLrzzAk/edit#gid=0"

navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(function(stream){

document.getElementById("video").srcObject = stream
document.getElementById("video").play()

})

const video = document.getElementById('video')

setInterval(() => {

const canvas = document.createElement("canvas")
const ctx = canvas.getContext("2d")

canvas.width = video.videoWidth
canvas.height = video.videoHeight

ctx.drawImage(video,0,0)

const imageData = canvas.toDataURL("image/png")

Tesseract.recognize(imageData,'eng').then(({data:{text}})=>{

let match = text.match(/R\d{2,3}-\d{3}-T-\d{3}/)

if(match){

let loop = match[0]

document.getElementById("result").innerHTML =
"Detected: "+loop

window.location.href = sheetURL + "&q=" + loop

}

})

},2000)

</script>

</body>
</html>
