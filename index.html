<!DOCTYPE html>
<html>
<head>
<title>Loop Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js"></script>
</head>

<body>

<h2>Loop Folder Scanner</h2>

<input type="file" accept="image/*" capture="environment" id="camera">

<p id="loop"></p>
<p id="status"></p>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1KpQhFdHimHm8rPLZ6519E9ADCUrCeGuYq7HXpLrzzAk/gviz/tq?tqx=out:csv";

document.getElementById("camera").addEventListener("change", function(){

const file = this.files[0];

Tesseract.recognize(
file,
'eng',
).then(({ data: { text } }) => {

const match = text.match(/R\d{2,3}-\d{3}-T-\d{3}/);

if(match){

let loop = match[0];

document.getElementById("loop").innerHTML =
"Loop Number: " + loop;

fetch(sheetURL)
.then(res => res.text())
.then(data => {

let rows = data.split("\n");

for(let r of rows){

if(r.includes(loop)){

let status = r.split(",")[1];

document.getElementById("status").innerHTML =
"Status: " + status;

}

}

});

}

});

});

</script>

</body>
</html>
