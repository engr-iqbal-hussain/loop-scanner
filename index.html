<!DOCTYPE html>
<html>
<head>
  <title>Loop Folder Auto Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    input { font-size: 16px; padding: 10px; margin: 5px; }
    p { font-size: 16px; }
  </style>
</head>
<body>

<h2>Loop Folder Auto Scanner</h2>

<p>Take a picture of the folder (or upload image):</p>
<input type="file" accept="image/*" capture="environment" id="camera"><br>

<p id="progress"></p>
<p id="ocrText"></p>
<p id="loop"></p>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1KpQhFdHimHm8rPLZ6519E9ADCUrCeGuYq7HXpLrzzAk/edit#gid=0";

document.getElementById("camera").addEventListener("change", function() {
    const file = this.files[0];
    if(!file) return alert("Please upload an image.");

    document.getElementById("progress").innerText = "Scanning image...";

    Tesseract.recognize(file, 'eng', {
        logger: m => document.getElementById("progress").innerText = m.status + " " + Math.floor((m.progress||0)*100) + "%"
    }).then(({ data: { text } }) => {

        document.getElementById("ocrText").innerHTML = "<b>OCR Text:</b><br>" + text;

        // Extract everything after "Instrument Loop No:"
        const splitText = text.split("Instrument Loop No:");
        if(splitText.length < 2){
            document.getElementById("loop").innerText = "❌ Loop number not detected";
            return;
        }

        // Take text after "Instrument Loop No:" and trim whitespace and newlines
        const scannedLoop = splitText[1].split("\n")[0].trim();

        if(!scannedLoop){
            document.getElementById("loop").innerText = "❌ Loop number not detected";
            return;
        }

        document.getElementById("loop").innerText = "✅ Detected Loop: " + scannedLoop;

        // Redirect to Google Sheet filtered for this loop
        window.location.href = sheetURL + "?search=" + encodeURIComponent(scannedLoop);

    }).catch(err => {
        document.getElementById("loop").innerText = "❌ Error scanning image: " + err;
    });
});
</script>

</body>
</html>
