<!DOCTYPE html>
<html>
<head>
  <title>Loop Filter Test</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    input, button { font-size: 16px; padding: 10px; margin: 5px; }
    p { font-size: 16px; }
  </style>
</head>
<body>

<h2>Loop Filter Test</h2>

<p>Upload/take a picture of the folder (optional, for reference):</p>
<input type="file" accept="image/*" capture="environment" id="camera"><br>

<p>Enter Loop Number to Filter:</p>
<input type="text" id="loopInput" placeholder="e.g. R93-500-T-002">
<button id="goLoop">Filter Loop</button>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1KpQhFdHimHm8rPLZ6519E9ADCUrCeGuYq7HXpLrzzAk/edit#gid=0";

document.getElementById("goLoop").addEventListener("click", function(){
    const loopNumber = document.getElementById("loopInput").value.trim();
    if(!loopNumber){
        alert("Please enter the loop number");
        return;
    }

    // Redirect to Google Sheet filtered for only this loop
    // The search query in Google Sheet will filter the given loop
    window.location.href = sheetURL + "?search=" + encodeURIComponent(loopNumber);
});
</script>

</body>
</html>
