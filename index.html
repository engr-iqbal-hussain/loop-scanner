<!DOCTYPE html>
<html>
<head>
  <title>Loop Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.18.6"></script>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    video { width: 100%; max-width: 400px; border: 2px solid black; }
    p { font-size: 16px; }
  </style>
</head>
<body>

<h2>Loop Folder Scanner</h2>
<p>Point your camera at the loop folder:</p>
<video id="video" autoplay></video>
<p id="result">Scanning...</p>

<script>
  // Your Google Sheet URL
  const sheetURL = "https://docs.google.com/spreadsheets/d/1KpQhFdHimHm8rPLZ6519E9ADCUrCeGuYq7HXpLrzzAk/edit#gid=0";

  // Start camera
  const video = document.getElementById('video');
  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => {
      video.srcObject = stream;
    })
    .catch(err => {
      document.getElementById("result").innerText = "Error accessing camera: " + err;
    });

  // Create canvas to capture frames
  const canvas = document.createElement("canvas");
  const context = canvas.getContext("2d");

  // Use ZXing for barcode-style detection (we will simulate text detection using pattern search)
  const loopRegex = /R\d{2,3}-\d{3}-T-\d{3}/i;

  const checkFrame = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    context.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // Convert frame to image data URL
    const dataURL = canvas.toDataURL("image/png");

    // Use Tesseract only on small cropped image for speed (optional) or simulate fast detection
    Tesseract.recognize(dataURL, 'eng').then(({ data: { text } }) => {
      const match = text.match(loopRegex);
      if (match) {
        const loop = match[0].trim();
        document.getElementById("result").innerText = "✅ Loop Detected: " + loop;

        // Redirect to Google Sheet filtered to that loop
        const redirectURL = sheetURL + "?search=" + loop;
        window.location.href = redirectURL;
      } else {
        requestAnimationFrame(checkFrame); // keep scanning
      }
    }).catch(() => {
      requestAnimationFrame(checkFrame); // retry on error
    });
  };

  video.addEventListener('loadeddata', () => {
    requestAnimationFrame(checkFrame);
  });
</script>

</body>
</html>
