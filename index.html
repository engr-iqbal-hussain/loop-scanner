<!DOCTYPE html>
<html>
<head>
  <title>Manual Loop Redirect Test</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    input, button { font-size: 16px; padding: 10px; margin: 5px; }
  </style>
</head>
<body>

<h2>Manual Loop Test</h2>

<p>Enter Loop Number:</p>
<input type="text" id="loopInput" placeholder="e.g. R93-500-T-002">
<button id="goLoop">Go to Sheet</button>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1KpQhFdHimHm8rPLZ6519E9ADCUrCeGuYq7HXpLrzzAk/edit#gid=0";

document.getElementById("goLoop").addEventListener("click", function(){
    const loopNumber = document.getElementById("loopInput").value.trim();
    if(!loopNumber){
        alert("Please enter a loop number");
        return;
    }

    // Redirect to Google Sheet filtered for this loop
    window.location.href = sheetURL + "?search=" + encodeURIComponent(loopNumber);
});
</script>

</body>
</html>
