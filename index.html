<!DOCTYPE html>
<html>
<head>
<title>Loop Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
body{font-family:Arial;text-align:center;padding:40px;}
</style>
</head>

<body>

<h2>Loop Folder Scanner</h2>

<input type="file" accept="image/*" capture="environment" id="camera">

<p id="progress"></p>
<p id="ocrText"></p>
<p id="loop"></p>
<p id="status"></p>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/1KpQhFdHimHm8rPLZ6519E9ADCUrCeGuYq7HXpLrzzAk/gviz/tq?tqx=out:csv";

document.getElementById("camera").addEventListener("change", function(){

document.getElementById("progress").innerHTML="Scanning image...";

const file = this.files[0];

Tesseract.recognize(file, 'eng', {
  logger: m => document.getElementById("progress").innerHTML = m.status + " " + Math.floor((m.progress||0)*100) + "%"
}).then(function(result){

let text = result.data.text;

// Show full OCR output for debugging
document.getElementById("ocrText").innerHTML = "<b>OCR Text:</b><br>"+text;

// Flexible regex: find Rxx-xxx-T-xxx anywhere in text, ignoring spaces/newlines
let loopPattern = /R\d{2,3}-\d{3}-T-\d{3}/i;
let match = text.match(loopPattern);

if(!match){
  document.getElementById("loop").innerHTML = "❌ Loop number not detected. Check OCR text above.";
  return;
}

let loop = match[0].trim();
document.getElementById("loop").innerHTML = "✅ Loop Number: "+loop;

// Redirect to Google Sheet with search query for fast filtering
let sheetSearchURL = "https://docs.google.com/spreadsheets/d/1KpQhFdHimHm8rPLZ6519E9ADCUrCeGuYq7HXpLrzzAk/edit#gid=0&q="+loop;
document.getElementById("status").innerHTML = "Redirecting to Google Sheet...";
window.location.href = sheetSearchURL;

});

});
</script>
</body>
</html>
