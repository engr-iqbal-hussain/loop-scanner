<!DOCTYPE html>
<html>
<head>
  <title>Loop Folder Quick Scanner</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    input, button { font-size: 16px; padding: 10px; margin: 5px; }
    p { font-size: 16px; }
  </style>
</head>
<body>

<h2>Loop Folder Quick Scanner</h2>

<p>Take a picture of the folder (or upload image):</p>
<input type="file" accept="image/*" capture="environment" id="camera"><br>

<p>Enter detected Loop Number (from photo):</p>
<input type="text" id="loopInput" placeholder="e.g. R93-500-T-002">

<button id="checkLoop">Go to Sheet</button>

<p id="status"></p>

<script>
const sheetCSV = "https://docs.google.com/spreadsheets/d/1KpQhFdHimHm8rPLZ6519E9ADCUrCeGuYq7HXpLrzzAk/gviz/tq?tqx=out:csv";
const sheetURL = "https://docs.google.com/spreadsheets/d/1KpQhFdHimHm8rPLZ6519E9ADCUrCeGuYq7HXpLrzzAk/edit#gid=0";

document.getElementById("checkLoop").addEventListener("click", function(){
    const scannedLoop = document.getElementById("loopInput").value.trim().toUpperCase();

    if(!scannedLoop){
        alert("Please enter a loop number.");
        return;
    }

    document.getElementById("status").innerText = "Checking loop in Sheet...";

    fetch(sheetCSV)
    .then(res => res.text())
    .then(data => {
        const rows = data.split("\n");
        let found = false;
        for(let r of rows){
            const loopInSheet = r.split(",")[0].trim().toUpperCase();
            if(loopInSheet === scannedLoop){
                found = true;
                break;
            }
        }

        if(found){
            document.getElementById("status").innerText = "✅ Loop found! Redirecting...";
            window.location.href = sheetURL + "?search=" + scannedLoop;
        } else {
            document.getElementById("status").innerText = "❌ Loop not found in Sheet!";
        }
    }).catch(err => {
        document.getElementById("status").innerText = "❌ Error: " + err;
    });
});
</script>

</body>
</html>
